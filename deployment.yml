apiVersion: apps/v1
kind: Deployment
metadata:
  name: latin-eats-web
  labels:
    app: latin-eats-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: latin-eats-web
  template:
    metadata:
      labels:
        app: latin-eats-web
    spec:
      containers:
        - name: latin-eats-web
          image: antares.blackhawk.local:5000/latin-eats-web:1.0.7
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: latin-eats-web-service
spec:
  type: NodePort
  selector:
    app: latin-eats-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30087
