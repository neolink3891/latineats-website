<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LatinEats — Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; background: #0a0a0a; overflow: hidden; }

    .menu-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0f0f0f;
      color: #f5f0e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 48px;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo-img { height: 48px; width: auto; }
    .tagline {
      font-size: 18px;
      color: #e03030;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }
    .clock {
      font-size: 32px;
      font-weight: 300;
      color: #f5a623;
      letter-spacing: 3px;
    }

    /* CATEGORY NAV */
    .category-nav {
      display: flex;
      justify-content: center;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .cat-tab {
      padding: 10px 24px;
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.3s, border-color 0.3s;
    }
    .cat-tab.active {
      color: #c8a96e;
      border-bottom: 2px solid #c8a96e;
    }

    /* CONTENT AREA */
    .content {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* PANEL — absolutely fills content area */
    .category-panel {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 12px 32px;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .category-panel.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .category-panel.leaving {
      opacity: 0;
      transform: translateY(-12px);
      pointer-events: none;
    }

    .cat-title {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #bf642a;
      margin-bottom: 10px;
      flex-shrink: 0;
      text-align: center;
    }

    /* GRID */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    /* CARD */
    .item {
      background: rgba(255,255,255,0.03);
      border: 0.5px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      opacity: 0;
      transform: translateY(16px) scale(0.97);
      animation: cardIn 0.4s ease forwards;
      transition: border-color 0.3s, transform 0.3s ease, box-shadow 0.3s ease;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .item:nth-child(1) { animation-delay: 0.05s; }
    .item:nth-child(2) { animation-delay: 0.10s; }
    .item:nth-child(3) { animation-delay: 0.15s; }
    .item:nth-child(4) { animation-delay: 0.20s; }
    .item:nth-child(5) { animation-delay: 0.25s; }
    .item:nth-child(6) { animation-delay: 0.30s; }
    .item:hover {
      border-color: rgba(200,169,110,0.4);
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    /* IMAGE — grows to fill available space */
    .item-img {
      width: 100%;
      flex: 1;
      min-height: 0;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }
    .item:hover .item-img { transform: scale(1.04); }

    /* BODY — fixed height, never grows */
    .item-body {
      flex-shrink: 0;
      padding: 8px 14px 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .item-top { display: flex; flex-direction: column; gap: 2px; }

    .item-name {
      font-size: 42px;
      font-weight: 800;
      color: #e03030;
      text-shadow: 0 0 14px rgba(245,166,35,0.6), 0 1px 2px rgba(200,80,0,0.5);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-desc {
      font-size: 24px;
      color: rgba(255,255,255,0.38);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 2px;
    }
    .item-price {
      font-size: 54px;
      font-weight: 800;
      color: #c8a96e;
      line-height: 1;
    }
    .item-tag {
      font-size: 30px;
      padding: 2px 9px;
      border-radius: 20px;
      background: rgba(200,169,110,0.1);
      color: #c8a96e;
      border: 0.5px solid rgba(200,169,110,0.25);
    }
    .item-tag.spicy { background: rgba(200,80,60,0.1); color: #e07060; border-color: rgba(200,80,60,0.25); }
    .item-tag.veg   { background: rgba(80,160,80,0.1);  color: #70c070; border-color: rgba(80,160,80,0.25); }

    /* PROGRESS BAR */
    .progress-bar { height: 3px; background: rgba(255,255,255,0.05); flex-shrink: 0; }
    .progress-fill { height: 100%; background: #c8a96e; width: 0%; transition: width 0.1s linear; }

    /* FOOTER */
    .footer {
      padding: 4px 48px;
      font-size: 10px;
      color: rgba(255,255,255,0.12);
      letter-spacing: 1px;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="menu-wrap">

  <div class="header">
    <div class="header-left">
      <img class="logo-img" src="../assets/img/logo/logo_small.png" alt="LatinEats logo">
      <div class="tagline"> - Authentic Latin American Food</div>
    </div>
    <div class="clock" id="clock"></div>
  </div>

  <div class="category-nav" id="cat-nav"></div>
  <div class="content" id="content"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="footer">latineats.co.uk</div>

</div>
<script>
const DEFAULT_IMG = '../assets/img/banner/pupusas.png';

const menu = [
  {
    cat: "Pupusas",
    items: [
      { name: "100 - Frijol con Queso", desc: "Corn flour made with mozzarella cheese and red kidney beans.", price: "£2.75", tag: "veg", img: "../assets/img/display/pupusa_1.png" },
      { name: "101 - Revueltas", desc: "Corn flour made with mozzarella cheese, red kidney beans and pork mix.", price: "£2.75", tag: "", img: "../assets/img/display/pupusa_1.png" },
      { name: "102 - Zukini", desc: "Corn flour made with mozzarella cheese and zukini mashup.", price: "£2.75", tag: "veg", img: "../assets/img/display/pupusa_1.png" },
      { name: "103 - Queso", desc: "Corn flour made with mozzarella cheese.", price: "£3.50", tag: "veg", img: "../assets/img/display/pupusa_1.png" },
      { name: "104 - Queso con Jalapeño", desc: "Corn flour made with mozzarella cheese and jalapeños.", price: "£3.50", tag: "spicy", img: "../assets/img/display/pupusa_1.png" },
      { name: "105 - Queso con Ajo", desc: "Corn flour made with mozzarella cheese and garlic.", price: "£3.50", tag: "", img: "../assets/img/display/pupusa_1.png" },
    ]
  },
  {
    cat: "Tacos",
    items: [
      { name: "Res", desc: "Marinated beef, onion & coriander", price: "£3.00", tag: "", img: "../assets/img/display/tacos_1.png" },
      { name: "Pollo", desc: "Marinated chicken, onion & coriander", price: "£3.00", tag: "", img: "../assets/img/display/tacos_1.png" },
      { name: "Cerdo", desc: "Marinated shrimps, onion & coriander", price: "£3.00", tag: "", img: "../assets/img/display/tacos_1.png" },
    ]
  },
  {
    cat: "Burgers",
    items: [
      { name: "Beef Burger", desc: "Beef burger with tomato, lettuce, peckles and mayo. Include chips", price: "£8.00", tag: "", img: "../assets/img/display/burger_1.png" },
      { name: "Chicken Burger", desc: "Chicken burger with tomato, lettuce, peckles and mayo. Include chips", price: "£8.00", tag: "", img: "../assets/img/display/burger_2.png" },
    ]
  },
  {
    cat: "Chips",
    items: [
      { name: "Papa 67", desc: "Fried chips with mayo, chopped beef meat, and jalapeños", price: "£0.00", tag: "spicy", img: "../assets/img/display/papa_1.png" },
    ]
  }
];

const nav = document.getElementById('cat-nav');
const content = document.getElementById('content');
const progress = document.getElementById('progress');

menu.forEach((cat, i) => {
  const tab = document.createElement('div');
  tab.className = 'cat-tab' + (i === 0 ? ' active' : '');
  tab.textContent = cat.cat;
  nav.appendChild(tab);

  const panel = document.createElement('div');
  panel.className = 'category-panel' + (i === 0 ? ' active' : '');

  const title = document.createElement('div');
  title.className = 'cat-title';
  title.textContent = cat.cat;
  panel.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'items-grid';

  cat.items.forEach(item => {
    const imgSrc = item.img || DEFAULT_IMG;
    const card = document.createElement('div');
    card.className = 'item';
    card.innerHTML = `
      <img class="item-img" src="${imgSrc}" alt="${item.name}" onerror="this.src='${DEFAULT_IMG}'">
      <div class="item-body">
        <div class="item-top">
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
        </div>
        <div class="item-footer">
          <div class="item-price">${item.price}</div>
          ${item.tag ? `<div class="item-tag ${item.tag}">${item.tag === 'spicy' ? '🌶️ spicy' : '🌿 veggie'}</div>` : ''}
        </div>
      </div>`;
    grid.appendChild(card);
  });

  panel.appendChild(grid);
  content.appendChild(panel);
});

let current = 0;
const DURATION = 8000;
let start = null;

function showCat(i) {
  const panels = document.querySelectorAll('.category-panel');
  const tabs = document.querySelectorAll('.cat-tab');

  const outgoing = panels[current];
  outgoing.classList.add('leaving');
  outgoing.classList.remove('active');
  outgoing.addEventListener('transitionend', () => outgoing.classList.remove('leaving'), { once: true });

  const incoming = panels[i];
  incoming.querySelectorAll('.item').forEach((card, idx) => {
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = '';
    card.style.animationDelay = (0.05 + idx * 0.05) + 's';
  });

  incoming.classList.add('active');
  tabs.forEach((t, j) => t.classList.toggle('active', j === i));
  current = i;
  start = performance.now();
}

function tick(ts) {
  if (!start) start = ts;
  const elapsed = ts - start;
  progress.style.width = Math.min((elapsed / DURATION) * 100, 100) + '%';
  if (elapsed >= DURATION) showCat((current + 1) % menu.length);
  requestAnimationFrame(tick);
}

document.querySelectorAll('.cat-tab').forEach((t, i) => t.addEventListener('click', () => showCat(i)));

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 1000);
start = performance.now();
requestAnimationFrame(tick);
</script>
</body>
</html>
