<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LatinEats — Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
    }

    .menu-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0f0f0f;
      color: #f5f0e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .logo-img {
      height: 56px;
      width: auto;
    }

    .tagline {
      font-size: 18px;
      color: #e03030;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .clock {
      font-size: 36px;
      font-weight: 300;
      color: #f5a623;
      letter-spacing: 3px;
    }

    /* CATEGORY NAV */
    .category-nav {
      display: flex;
      justify-content: center;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      padding: 0 48px;
      flex-shrink: 0;
    }

    .cat-tab {
      padding: 14px 28px;
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
      text-align: center;
    }

    .cat-tab.active {
      color: #c8a96e;
      border-bottom: 2px solid #c8a96e;
    }

    /* CONTENT AREA */
    .content {
      flex: 1;
      padding: 24px 48px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .category-panel {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .category-panel.active {
      display: flex;
    }

    .cat-title {
      font-size: 22px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #bf642a;
      margin-bottom: 16px;
      flex-shrink: 0;
      text-align: center;
    }

    /* GRID: 2 rows x 3 cols filling remaining height */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 14px;
      flex: 1;
    }

    .item {
      background: rgba(255,255,255,0.03);
      border: 0.5px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.3s;
    }

    .item:hover {
      border-color: rgba(200,169,110,0.3);
    }

    /* FOOD IMAGE */
    .item-img {
      width: 100%;
      flex: 0 0 60%;
      object-fit: cover;
      display: block;
      min-height: 0;
    }

    .item-body {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 0 0 35%;
      padding: 10px 18px;
      text-align: center;
      min-height: 0;
      overflow: hidden;
    }

    .item-top { display: flex; flex-direction: column; gap: 4px; }

    .item-name {
      font-size: 36px;
      font-weight: 800;
      color: #e03030;
      text-shadow: 0 0 18px rgba(245,166,35,0.7), 0 1px 1px rgba(245,100,0,0.5);
    }

    .item-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      line-height: 1.4;
    }

    .item-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }

    .item-price {
      font-size: 46px;
      font-weight: 800;
      color: #c8a96e;
    }

    .item-tag {
      font-size: 16px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(200,169,110,0.1);
      color: #c8a96e;
      border: 0.5px solid rgba(200,169,110,0.25);
      letter-spacing: 0.5px;
    }

    .item-tag.spicy {
      background: rgba(200,80,60,0.1);
      color: #e07060;
      border-color: rgba(200,80,60,0.25);
    }

    .item-tag.veg {
      background: rgba(80,160,80,0.1);
      color: #70c070;
      border-color: rgba(80,160,80,0.25);
    }

    /* PROGRESS BAR */
    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .progress-fill {
      height: 100%;
      background: #c8a96e;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* FOOTER */
    .footer {
      padding: 6px 48px;
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 1px;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="menu-wrap">

  <div class="header">
    <div class="header-left">
      <img class="logo-img" src="../assets/img/logo/logo_small.png" alt="LatinEats logo">
      <div class="tagline">Authentic Latin American Food</div>
    </div>
    <div class="clock" id="clock"></div>
  </div>

  <div class="category-nav" id="cat-nav"></div>

  <div class="content" id="content"></div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="footer">latineats.co.uk</div>

</div>

<script>
const DEFAULT_IMG = '../assets/img/banner/pupusas.png';

const menu = [
  {
    cat: "Starters",
    items: [
      { name: "Empanadas (x3)", desc: "Crispy pastry filled with spiced beef, olive & egg", price: "£6.50", tag: "", img: "" },
      { name: "Guacamole & chips", desc: "Freshly made avocado, lime, coriander & jalapeño", price: "£5.50", tag: "veg", img: "" },
      { name: "Elote callejero", desc: "Mexican street corn with cotija, chilli & lime mayo", price: "£5.00", tag: "veg", img: "" },
      { name: "Pupusa sampler (x2)", desc: "Salvadoran stuffed corn cakes with curtido slaw", price: "£7.00", tag: "", img: "" },
      { name: "Ceviche tostadas", desc: "Citrus-cured fish on crispy tostada with avocado", price: "£8.00", tag: "", img: "" },
      { name: "Chorizo al vino", desc: "Sliced chorizo sautéed in red wine & herbs", price: "£6.00", tag: "spicy", img: "" },
    ]
  },
  {
    cat: "Tacos",
    items: [
      { name: "Taco al pastor", desc: "Marinated pork, pineapple, onion & coriander", price: "£4.00", tag: "spicy", img: "" },
      { name: "Taco de carnitas", desc: "Slow-cooked pulled pork, salsa verde & lime", price: "£4.00", tag: "", img: "" },
      { name: "Taco de pollo", desc: "Grilled chicken, chipotle crema & pickled onion", price: "£4.00", tag: "", img: "" },
      { name: "Taco de camarones", desc: "Sautéed prawns, mango salsa & avocado crema", price: "£5.00", tag: "", img: "" },
      { name: "Taco de hongos", desc: "Portobello mushroom, black beans & salsa roja", price: "£3.50", tag: "veg", img: "" },
      { name: "Taco de birria", desc: "Braised beef, consommé dipping sauce & oaxaca cheese", price: "£5.50", tag: "spicy", img: "" },
    ]
  },
  {
    cat: "Mains",
    items: [
      { name: "Bandeja paisa", desc: "Red beans, rice, chicharrón, egg, chorizo & avocado", price: "£14.50", tag: "", img: "" },
      { name: "Pupusas revueltas", desc: "Three corn cakes with pork & cheese, curtido & tomato salsa", price: "£11.00", tag: "", img: "" },
      { name: "Pollo a la plancha", desc: "Grilled chicken breast, chimichurri, rice & salad", price: "£12.50", tag: "", img: "" },
      { name: "Carne asada", desc: "Grilled marinated flank steak, fries & chimichurri", price: "£15.00", tag: "spicy", img: "" },
      { name: "Enchiladas verdes", desc: "Chicken-filled tortillas, tomatillo sauce & crema", price: "£12.00", tag: "", img: "" },
      { name: "Cazuela de mariscos", desc: "Seafood stew with prawns, mussels & coconut broth", price: "£16.00", tag: "", img: "" },
    ]
  },
  {
    cat: "Sides",
    items: [
      { name: "Arroz con cilantro", desc: "Fragrant coriander rice with lime", price: "£3.00", tag: "veg", img: "" },
      { name: "Frijoles negros", desc: "Slow-cooked black beans with epazote", price: "£3.00", tag: "veg", img: "" },
      { name: "Patacones", desc: "Twice-fried plantain with aji dipping sauce", price: "£3.50", tag: "veg", img: "" },
      { name: "Yuca frita", desc: "Crispy fried cassava with garlic & herbs", price: "£3.50", tag: "veg", img: "" },
      { name: "Ensalada fresca", desc: "Tomato, cucumber, red onion & coriander", price: "£3.00", tag: "veg", img: "" },
      { name: "Pico de gallo", desc: "Fresh tomato salsa with jalapeño & lime", price: "£2.50", tag: "veg", img: "" },
    ]
  },
  {
    cat: "Drinks",
    items: [
      { name: "Horchata", desc: "Traditional rice milk with cinnamon & vanilla", price: "£3.50", tag: "veg", img: "" },
      { name: "Agua de jamaica", desc: "Hibiscus flower iced water, lightly sweetened", price: "£3.00", tag: "veg", img: "" },
      { name: "Limonada de coco", desc: "Colombian coconut lemonade, blended & creamy", price: "£4.00", tag: "veg", img: "" },
      { name: "Michelada", desc: "Mexican beer cocktail, lime, hot sauce & chilli rim", price: "£5.50", tag: "spicy", img: "" },
      { name: "Agua fresca", desc: "Daily fresh fruit water — ask for today's flavour", price: "£3.00", tag: "veg", img: "" },
      { name: "Soft drinks", desc: "Coke, Diet Coke, Sprite, still & sparkling water", price: "£2.50", tag: "", img: "" },
    ]
  },
  {
    cat: "Desserts",
    items: [
      { name: "Tres leches", desc: "Sponge cake soaked in three milks, whipped cream", price: "£5.50", tag: "", img: "" },
      { name: "Churros con chocolate", desc: "Fried dough sticks with dark chocolate dipping sauce", price: "£5.00", tag: "", img: "" },
      { name: "Flan de caramelo", desc: "Classic caramel custard, smooth & silky", price: "£5.00", tag: "veg", img: "" },
      { name: "Arroz con leche", desc: "Creamy rice pudding with cinnamon & raisins", price: "£4.50", tag: "veg", img: "" },
    ]
  }
];

const nav = document.getElementById('cat-nav');
const content = document.getElementById('content');
const progress = document.getElementById('progress');

menu.forEach((cat, i) => {
  const tab = document.createElement('div');
  tab.className = 'cat-tab' + (i === 0 ? ' active' : '');
  tab.textContent = cat.cat;
  nav.appendChild(tab);

  const panel = document.createElement('div');
  panel.className = 'category-panel' + (i === 0 ? ' active' : '');

  const title = document.createElement('div');
  title.className = 'cat-title';
  title.textContent = cat.cat;
  panel.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'items-grid';

  cat.items.forEach(item => {
    const imgSrc = item.img || DEFAULT_IMG;
    const card = document.createElement('div');
    card.className = 'item';
    card.innerHTML = `
      <img class="item-img" src="${imgSrc}" alt="${item.name}" onerror="this.src='${DEFAULT_IMG}'">
      <div class="item-body">
        <div class="item-top">
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
        </div>
        <div class="item-footer">
          <div class="item-price">${item.price}</div>
          ${item.tag ? `<div class="item-tag ${item.tag}">${item.tag === 'spicy' ? '🌶️ spicy' : '🌿 veggie'}</div>` : ''}
        </div>
      </div>`;
    grid.appendChild(card);
  });

  panel.appendChild(grid);
  content.appendChild(panel);
});

let current = 0;
const DURATION = 8000;
let start = null;

function showCat(i) {
  document.querySelectorAll('.cat-tab').forEach((t, j) => t.classList.toggle('active', j === i));
  document.querySelectorAll('.category-panel').forEach((p, j) => p.classList.toggle('active', j === i));
  current = i;
  start = performance.now();
}

function tick(ts) {
  if (!start) start = ts;
  const elapsed = ts - start;
  const pct = Math.min((elapsed / DURATION) * 100, 100);
  progress.style.width = pct + '%';
  if (elapsed >= DURATION) showCat((current + 1) % menu.length);
  requestAnimationFrame(tick);
}

document.querySelectorAll('.cat-tab').forEach((t, i) => {
  t.addEventListener('click', () => showCat(i));
});

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 1000);

showCat(0);
requestAnimationFrame(tick);
</script>
</body>
</html>
